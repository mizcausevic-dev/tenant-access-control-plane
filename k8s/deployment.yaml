apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-access-control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tenant-access-control-plane
  template:
    metadata:
      labels:
        app: tenant-access-control-plane
    spec:
      containers:
        - name: web
          image: ghcr.io/mizcausevic-dev/tenant-access-control-plane:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tenant-access-control-plane-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tenant-access-control-plane-secrets
                  key: redis-url
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: tenant-access-control-plane-secrets
                  key: session-secret
