services:
  web:
    build: .
    environment:
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:-tenant-access-control-plane-demo-secret}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tenant_access_control_plane
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tenant_access_control_plane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tenant-access-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  tenant-access-postgres:
