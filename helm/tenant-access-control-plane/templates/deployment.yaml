apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-access-control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tenant-access-control-plane
  template:
    metadata:
      labels:
        app: tenant-access-control-plane
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: PORT
              value: "{{ .Values.env.port }}"
